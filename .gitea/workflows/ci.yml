name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Runtime (Linux)
    runs-on: ubuntu-22.04
    container: ubuntu:22.04
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq clang lld llvm-dev libssl-dev pkg-config git curl ca-certificates

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Download Rockit toolchain
        run: |
          API="${GITHUB_SERVER_URL}/api/v1"
          curl -sL -H "Authorization: token ${GITHUB_TOKEN}" \
            "${API}/packages/Dark-Matter/generic/rockit-toolchain/latest/rockit-toolchain-linux-x86_64.tar.gz" \
            -o /tmp/toolchain.tar.gz
          cd /tmp && tar -xzf toolchain.tar.gz
          chmod +x /tmp/rockit-toolchain/bin/rockit
          /tmp/rockit-toolchain/bin/rockit version
          echo "ROCKIT=/tmp/rockit-toolchain/bin/rockit" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Build Rockit freestanding runtime
        run: |
          ROCKIT=$ROCKIT bash rockit/build.sh

      - name: Verify output
        run: |
          test -f rockit/rockit_runtime.o
          echo "rockit_runtime.o built successfully"

      - name: Compile C runtime
        run: |
          clang -c -O2 -w -o c/rockit_runtime.o c/rockit_runtime.c
          test -f c/rockit_runtime.o
          echo "C runtime compiled successfully"

  mirror:
    name: Mirror to GitHub
    runs-on: ubuntu-22.04
    needs: [build-linux]
    if: github.event_name == 'push'
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}
      - name: Push to GitHub
        run: |
          git remote add github "https://x-access-token:${GH_MIRROR_PAT}@github.com/dark-matter-tech/rockit-runtime.git"
          git push github --all --force
          git push github --tags --force
          echo "Mirrored to GitHub"
        env:
          GH_MIRROR_PAT: ${{ secrets.GH_MIRROR_PAT }}
