name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Runtime (Linux)
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq clang lld llvm-dev libssl-dev curl git

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Clone and build Stage 0 compiler (Swift)
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-booster.git /tmp/stage0
          cd /tmp/stage0 && swift build -c release
          STAGE0="$(cd /tmp/stage0 && swift build -c release --show-bin-path)/rockit"
          echo "STAGE0=$STAGE0" >> "$GITHUB_ENV"

      - name: Clone rockit-compiler (Stage 1 source)
        run: |
          git clone --depth 1 --recurse-submodules https://github.com/dark-matter-tech/rockit-compiler.git /tmp/rockit-compiler

      - name: Build Stage 1 compiler
        run: |
          cd /tmp/rockit-compiler && bash src/build.sh
          "$STAGE0" build-native /tmp/rockit-compiler/src/command.rok -o /tmp/stage1
          echo "ROCKIT=/tmp/stage1" >> "$GITHUB_ENV"

      - name: Build Rockit freestanding runtime
        run: |
          ROCKIT=/tmp/stage1 bash rockit/build.sh

      - name: Verify output
        run: |
          test -f rockit/rockit_runtime.o
          echo "rockit_runtime.o built successfully"

      - name: Compile C runtime
        run: |
          clang -c -O2 -w -o c/rockit_runtime.o c/rockit_runtime.c
          test -f c/rockit_runtime.o
          echo "C runtime compiled successfully"
