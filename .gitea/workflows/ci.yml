name: CI

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Runtime (Linux)
    runs-on: ubuntu-22.04
    container: swift:5.10.1-jammy
    defaults:
      run:
        shell: bash

    steps:
      - name: Install dependencies
        run: |
          apt-get update && apt-get install -y --no-install-recommends git libssl-dev pkg-config
          if command -v clang > /dev/null 2>&1; then
            echo "clang already available: $(clang --version | head -1)"
          else
            apt-get install -y --no-install-recommends clang-15
            ln -sf /usr/bin/clang-15 /usr/bin/clang
          fi
          apt-get clean && rm -rf /var/lib/apt/lists/*

      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          BRANCH="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          git clone --depth 1 --branch "${BRANCH}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}

      - name: Build Rockit compiler (Stage 0 + Stage 1)
        run: |
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-booster.git /tmp/stage0
          cd /tmp/stage0 && swift build -c release && cd -
          git clone --depth 1 https://github.com/dark-matter-tech/rockit-compiler.git /tmp/compiler
          cd /tmp/compiler
          ROCKIT=/tmp/stage0/.build/release/rockit
          bash src/build.sh
          $ROCKIT build-native src/command.rok
          cd -
          ln -sf /tmp/compiler/src/command /usr/local/bin/rockit

      - name: Build Rockit freestanding runtime
        run: |
          bash rockit/build.sh

      - name: Verify output
        run: |
          test -f rockit/rockit_runtime.o
          echo "rockit_runtime.o built successfully"

      - name: Compile C runtime
        run: |
          clang -c -O2 -w -o c/rockit_runtime.o c/rockit_runtime.c
          test -f c/rockit_runtime.o
          echo "C runtime compiled successfully"

  mirror:
    name: Mirror to GitHub
    runs-on: ubuntu-22.04
    needs: [build-linux]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/beta' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/staging')
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          echo "machine ${GITHUB_SERVER_URL#https://} login x-access-token password ${GITHUB_TOKEN}" > ~/.netrc
          chmod 600 ~/.netrc
          git clone --bare "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" .
        env:
          GITHUB_TOKEN: ${{ gitea.token }}
      - name: Push to GitHub
        run: |
          git remote add github "https://x-access-token:${GH_MIRROR_PAT}@github.com/dark-matter-tech/rockit-runtime.git"
          git push github --all --force
          git push github --tags --force
          echo "Mirrored to GitHub"
        env:
          GH_MIRROR_PAT: ${{ secrets.GH_MIRROR_PAT }}
