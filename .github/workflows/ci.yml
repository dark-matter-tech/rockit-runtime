name: CI

on:
  push:
  pull_request:
    branches: [develop, beta, master, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Runtime (Linux)
    runs-on: ubuntu-22.04
    container: wrightwingman/rockit-toolchain:latest
    env:
      ROCKIT: /usr/local/bin/rockit
      RUNTIME: /usr/local/share/rockit/rockit_runtime.o

    steps:
      - name: Checkout rockit-runtime
        uses: actions/checkout@v4

      - name: Build Rockit freestanding runtime
        run: |
          bash rockit/build.sh

      - name: Verify output
        run: |
          test -f rockit/rockit_runtime.o
          echo "rockit_runtime.o built successfully"

      - name: Compile C runtime
        run: |
          clang -c -O2 -w -o c/rockit_runtime.o c/rockit_runtime.c
          test -f c/rockit_runtime.o
          echo "C runtime compiled successfully"
